spring:
  application:
    name: TechStoreManager
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        type:
          json_format_mapper: org.hibernate.type.format.jackson.JacksonJsonFormatMapper
  sql:
    init:
      mode: always

  jwt:
    expiration: ${JWT_EXPIRATION}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION}
    secret: ${JWT_SECRET}
    google-client-id: ${GOOGLE_CLIENT_ID}
    facebook:
      app-id: ${FACEBOOK_APP_ID}
      secret: ${FACEBOOK_APP_SECRET}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloudinary:
    cloud_name: ${CLOUDINARY_CLOUD_NAME}
    api_key: ${CLOUDINARY_API_KEY}
    api_secret: ${CLOUDINARY_API_SECRET}

  gemini:
    api-key: ${GEMINI_API_KEY}
    url: ${GEMINI_URL}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 200MB

  goship:
    api:
      url: https://sandbox.goship.io/api/v2
      token: ${GOSHIP_API_TOKEN}
    shop:
      name: TechStore
      phone: 0353198531
      address: 123 Đường ABC
      city: 100000
      district: 100900
      ward: 113

  vnpay:
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    returnUrl: ${VNPAY_RETURN_URL}
    tmnCode: ${VNPAY_TMN_CODE}
    hashSecret: ${VNPAY_HASH_SECRET}
    version: 2.1.0
    command: pay
    currCode: VND

  app:
    frontend:
      url: https://techstores-two.vercel.app


  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    username: ${ADMIN_USERNAME}
    phone: ${ADMIN_PHONE}

